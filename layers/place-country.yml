id: place-country
type: symbol
source: geolonia
source-layer: place
maxzoom: 12
filter:
  - ==
  - class
  - country
layout:
  text-font:
    - Noto Sans Bold
  text-field: '{name}'
  text-size:
    stops:
      - - 1
        - 14
      - - 4
        - 20
  text-max-width: 6
  text-letter-spacing: 0.1
paint:
  text-color: '#444444'
  text-halo-color: '#ffffff'
  text-halo-width: 2
