id: boundary-land-level-6
type: line
source: geolonia
source-layer: boundary
minzoom: 8
filter:
  - all
  - - ==
    - - get
      - admin_level
    - 6
  - - ==
    - - has
      - maritime
    - false
layout:
  line-join: round
  line-cap: round
paint:
  # 地理院地図の白地図に合わせ、市区町村界はグレーの実線で表示する
  line-color: '#999999'
  line-width:
    stops:
      - - 8
        - 1
      - - 12
        - 1.5
