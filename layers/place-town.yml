id: place-town
type: symbol
source: geolonia
source-layer: place
minzoom: 9
maxzoom: 16
filter:
  - ==
  - class
  - town
layout:
  text-font:
    - Noto Sans Regular
  text-field: '{name}'
  text-size:
    stops:
      - - 9
        - 12
      - - 13
        - 15
  text-max-width: 6
paint:
  text-color: '#666666'
  text-halo-color: '#ffffff'
  text-halo-width: 1.5
