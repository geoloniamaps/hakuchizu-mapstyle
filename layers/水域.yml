id: 水域
type: fill
source: v
source-layer: WA
filter:
  # 川・水路・湖池(下記 vt_code)は大小問わず非表示にする。
  # 中ズームの海(5101)は残す。高ズームの 5201 は大河川と湾(海)が同コードのため、
  # 大河川を消す優先で除外する（高ズームの沿岸の海も白くなるトレードオフあり）。
  - '!'
  - - in
    - - get
      - vt_code
    - - literal
      - - 5201
        - 5202
        - 5203
        - 5211
        - 5212
        - 5231
        - 5233
        - 5242
        - 5290
paint:
  # 海・大きな水域を薄い青で塗る（背景の海色と揃える）
  fill-color: '#dbeaf5'
