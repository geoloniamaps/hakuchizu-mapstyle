<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>白地図マップスタイル プレビュー</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
    }
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1;
      background: rgba(255, 255, 255, 0.9);
      padding: 10px 14px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      font-size: 14px;
    }
    #controls select {
      margin-top: 6px;
      padding: 4px 8px;
      font-size: 14px;
      border-radius: 4px;
      border: 1px solid #ccc;
      width: 100%;
    }
    .geolonia {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="controls">
    <strong>スタイル切替</strong>
    <select id="style-select">
      <option value="./style.json">ラベルあり</option>
      <option value="./style-nolabel.json">国名のみ</option>
      <option value="./style-notext.json">テキストなし</option>
    </select>
  </div>
  <div
    id="map"
    class="geolonia"
    data-style="./style.json"
    data-lat="36.0"
    data-lng="137.0"
    data-zoom="5"
  ></div>
  <script>
    // URLパラメータからスタイルを復元
    var params = new URLSearchParams(location.search);
    var savedStyle = params.get('style');
    var select = document.getElementById('style-select');
    var mapEl = document.getElementById('map');

    if (savedStyle) {
      select.value = savedStyle;
      mapEl.dataset.style = savedStyle;
    }

    select.addEventListener('change', function() {
      var url = new URL(location.href);
      url.searchParams.set('style', this.value);
      location.href = url.toString();
    });
  </script>
  <script src="https://cdn.geolonia.com/v1/embed?geolonia-api-key=YOUR-API-KEY"></script>
</body>
</html>
